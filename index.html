<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ascent — A Rite of Passage</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #2a2520;
            color: #ede9e1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .bg-photo {
            position: fixed;
            inset: 0;
            background: url('images/mood-landscape.png') center 55% / cover no-repeat;
            filter: brightness(0.58) saturate(0.9);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, rgba(15,14,13,0.2) 0%, rgba(15,14,13,0.75) 100%);
        }

        .content {
            position: relative;
            z-index: 2;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }

        .emblem svg { display: block; }

        .eyebrow {
            font-size: 0.65rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: #8b7355;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 300;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #ede9e1;
            line-height: 1;
        }

        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1rem, 2vw, 1.25rem);
            font-style: italic;
            color: #c9b896;
            letter-spacing: 0.1em;
        }

        .rule {
            width: 1px;
            height: 50px;
            background: linear-gradient(180deg, #8b7355, transparent);
        }

        .message {
            font-size: 0.85rem;
            color: #aaa098;
            letter-spacing: 0.08em;
            line-height: 1.8;
        }

        .contact {
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            color: #8b7355;
            text-decoration: none;
            border-bottom: 1px solid rgba(139,115,85,0.3);
            padding-bottom: 2px;
            transition: color 0.2s, border-color 0.2s;
        }

        .contact:hover {
            color: #c9b896;
            border-color: rgba(201,184,150,0.4);
        }
    </style>
</head>
<body>

    <div class="bg-photo"></div>
    <div class="overlay"></div>

    <div class="content">

        <div class="emblem">
            <svg width="160" height="95" viewBox="0 0 220 130" fill="none" xmlns="http://www.w3.org/2000/svg">
                <line x1="0" y1="118" x2="220" y2="118" stroke="#2a2622" stroke-width="0.8"/>
                <path d="M4 118 L38 58 L72 118" stroke="#3a3020" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M55 118 L110 12 L165 118" stroke="#c9b896" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M148 118 L182 62 L216 118" stroke="#8b7355" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>

        <p class="eyebrow">The Ascent Pathway</p>

        <h1>The Ascent</h1>

        <p class="tagline">A Rite of Passage</p>

        <div class="rule"></div>

        <p class="message">Something is coming.<br>A structured rite of passage for young men at the threshold of adulthood.</p>

        <a class="contact" href="mailto:hello@theascentpathway.com">hello@theascentpathway.com</a>

    </div>

</body>
</html>
